  <!-- 🧩 Fonty -->

  <link rel="preload" as="font" type="font/woff2" href="fonts/Montserrat-SemiBold.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="fonts/Montserrat-Bold.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="fonts/BBHBartle.woff2" crossorigin>

  <!-- 🎨 Hlavní styl -->

  <!-- 🖋️ Favicona -->

  <!-- 🔍 Strukturovaná data -->

  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Zdelovská lávka",
    "url": "https://example.com",
    "logo": "fotky/logo.png",
    "sameAs": [
      "https://facebook.com/example",
      "https://instagram.com/example"
    ]
  }
  </script>
</head>

<body>

  <!-- === HLAVIČKA === -->
  <header>
    <div class="nav-bar">
      <div class="nav-left">
        <!-- Logo -->
        <a href="index.html" class="logo">
          <img src="fotky/banner header.png" alt="Zdelovská lávka logo">
        </a>

        <!-- Datum akce -->
        <a href="program.html" class="event-date">
          <img src="fotky/png text banner.png" alt="Datum akce 2026" />
        </a>
      </div>

      <nav aria-label="Hlavní navigace">
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="active">Novinky</a></li>
          <li><a href="o-akci.html">O akci</a></li>
          <li><a href="program.html">Program</a></li>
          <li><a href="informace.html">Informace</a></li>
          <li><a href="fotky.html">Fotky</a></li>
          <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
       
</div>

      </nav>

      <div class="burger" id="burger" aria-label="Otevřít menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <section class="hero">
  <!-- === PŘEKRYVNÝ OBRÁZEK NAD VIDEEM === -->
  <div class="video-overlay">
    <img src="fotky/zdelovskalavka.png" alt="Zdelovská lávka 2026" class="overlay-img">
  </div>

  <!-- === POZADÍ VIDEO === -->
  <video autoplay muted loop playsinline class="background-video">
    <source src="videa/video lavka2.mp4" type="video/mp4">
    Tvůj prohlížeč nepodporuje video tag.
  </video>

  <!-- === ODPOČET === -->
  <div class="countdown-container">
    <div id="countdown">
      <span>
        <span class="count-value" id="days">00</span>
        <span class="count-label">DNY</span>
      </span>
      <span>
        <span class="count-value" id="hours">00</span>
        <span class="count-label">HOD</span>
      </span>
      <span>
        <span class="count-value" id="minutes">00</span>
        <span class="count-label">MIN</span>
      </span>
      <span>
        <span class="count-value" id="seconds">00</span>
        <span class="count-label">SEK</span>
      </span>
    </div>
  </div>
</section>


  <!-- === HLAVNÍ OBSAH === -->
  <main class="main-content" role="main">
    <section class="news-grid">
      <article class="card">
        <a href="program.html">
          <img src="fotky/DSC_6867.jpg" alt="Přípravy na další ročník" class="news-thumb" loading="lazy" />
        </a>
      </article>
    </section>

    <section class="news-grid">
      <article class="card">
        <a href="indexnovinky/shrnutí zdelovské lávky.html">
          <img src="fotky/shrnutizdel.png" alt="Nejlepší momenty z loňska" class="news-thumb" loading="lazy" width="1280" height="720" />
        </a>
      </article>
    </section>

    <section class="news-grid">
      <article class="card">
        <a href="indexnovinky/pozarkoupaliste.html">
          <img src="fotky/pozarkoupalistesekce.png" alt="Požár areálu koupaliště Zdelov" class="news-thumb" loading="lazy" />
        </a>
      </article>
    </section>
  </main>

  <!-- === PATIČKA === -->
  <footer>
    <div class="footer-inner">
      <p>© <span id="year"></span> Zdelovská lávka</p>

      <div class="sponsors-section">
        <h3>Partneři a sponzoři</h3>
        <div class="sponsor-logos">
          <img src="sponsors/hptronic.jpg" alt="HP Tronic" loading="lazy" />
          <img src="fotky/sponzori/a-zchlazeni.png" alt="A-Z Chlazení" loading="lazy" />
          <img src="fotky/sponzori/bencklenoty.png" alt="Benck Lenoty" loading="lazy" />
          <img src="fotky/sponzori/blackdrops.png" alt="Black Drops" loading="lazy" />
          <img src="fotky/sponzori/clock.png" alt="Clock" loading="lazy" />
          <img src="fotky/sponzori/enzltransport.png" alt="Enzl Transport" loading="lazy" />
          <img src="fotky/sponzori/mestoborohradek.png" alt="Město Borohrádek" loading="lazy" />
          <img src="fotky/sponzori/obeczdelov.png" alt="Obec Zdelov" loading="lazy" />
          <img src="fotky/sponzori/realtrading.png" alt="Real Trading" loading="lazy" />
          <img src="fotky/sponzori/slevomat.png" alt="Slevomat" loading="lazy" />
          <img src="fotky/sponzori/teliacom.png" alt="TeliaCom" loading="lazy" />
          <img src="fotky/sponzori/telux.png" alt="Telux" loading="lazy" />
          <img src="fotky/sponzori/uhlivilimek.png" alt="Uhlí Vilímek" loading="lazy" />
          <img src="fotky/sponzori/zdelovskahospoda.png" alt="Zdelovská hospoda" loading="lazy" />
        </div>
      </div>
    </div>
  </footer>

  <!-- === SCRIPTS === -->
  <script>
    // 🍔 Burger menu
    const burger = document.getElementById("burger");
    const navLinks = document.getElementById("navLinks");
    burger.addEventListener("click", () => {
      navLinks.classList.toggle("show");
    });

    // 📅 Rok v patičce
    document.getElementById("year").textContent = new Date().getFullYear();

    // 🖼️ Obrázky – fade-in efekt
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".news-thumb").forEach((img) => {
        if (img.complete) {
          img.classList.add("loaded");
        } else {
          img.addEventListener("load", () => img.classList.add("loaded"));
        }
      });
    });

    // 🎥 Video fade-in
    const video = document.querySelector('.background-video');
    video.addEventListener('loadeddata', () => {
      video.classList.add('loaded');
    });

    // 🕒 ODPOČET DO AKCE (25. 7. 2026, 14:00)
    const targetDate = new Date("July 25, 2026 14:00:00").getTime();

    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        clearInterval(countdown);
        document.getElementById("countdown").innerHTML =
          "<span class='count-value'>AKCE ZAČALA!</span>";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = String(days).padStart(2, "0");
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }, 1000);
  </script>
</body>
</html>
