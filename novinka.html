<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Novinka k akci Zdelovská lávka 2026." />
  <meta name="theme-color" content="#ffffff" />
  <title>Novinka | Zdelovská lávka 2026</title>

  <link rel="preload" as="image" href="fotky/banner-header.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700;1,800;1,900&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="fotky/favicon.png" />

  <style>
    .json-news-state {
      margin: 0;
      color: #2d2112;
      font-family: var(--font-main);
      font-size: 1.02rem;
      line-height: 1.8;
      font-weight: 600;
    }

    .json-news-image[hidden] {
      display: none;
    }

    .json-news-image {
      width: min(100%, 760px);
      max-height: 420px;
      margin-left: auto;
      margin-right: auto;
      object-fit: cover;
    }

    .json-news-loading article.detail {
      visibility: hidden;
    }

    .json-news-media {
      width: min(100%, 760px);
      margin: 1.55rem auto;
      box-shadow: 0 16px 34px rgba(82, 56, 14, 0.14);
      background: #080808;
    }

    .json-news-media img,
    .json-news-media video {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      background: #080808;
    }

    .json-news-media video {
      aspect-ratio: 16 / 9;
      max-height: none;
    }

    @media (max-width: 768px) {
      .json-news-image,
      .json-news-media {
        width: 100%;
      }

      .json-news-image {
        max-height: 320px;
      }
    }
  </style>
</head>

<body class="article-page json-news-loading">
  <header>
    <div class="nav-bar">
      <div class="nav-left">
        <a href="index.html" class="logo" aria-label="Zdelovská lávka - hlavní stránka">
          <img src="fotky/banner-header.png" alt="Zdelovská lávka logo" />
        </a>

        <a href="program.html" class="event-date" aria-label="Přejít na program akce">
          <img src="fotky/png-text-banner.png" alt="Datum akce 25/7/2026" />
        </a>
      </div>

      <nav aria-label="Hlavní navigace">
        <ul class="nav-links" id="navLinks">
          <li class="nav-mobile-brand">
            <a href="index.html" aria-label="Zdelovská lávka - hlavní stránka">
              <img src="fotky/banner-header.png" alt="Zdelovská lávka logo" />
            </a>
          </li>

          <li><a href="index.html" class="active" aria-current="page">Novinky</a></li>
          <li><a href="o-akci.html">O akci</a></li>
          <li><a href="program.html">Program</a></li>
          <li><a href="informace.html">Informace</a></li>
          <li><a href="fotky.html">Fotky</a></li>
          <li><a href="kontakt.html">Kontakt</a></li>

          <li class="nav-mobile-socials" aria-label="Sociální sítě">
            <a href="https://www.instagram.com/zdelovskalavka/" target="_blank" rel="noopener noreferrer" aria-label="Instagram Zdelovské lávky">
              <img src="fotky/instagram.png" alt="Instagram" />
            </a>

            <span class="nav-social-handle">@Zdelovská lávka</span>

            <a href="https://www.facebook.com/events/1381706463970757" target="_blank" rel="noopener noreferrer" aria-label="Facebook Zdelovské lávky">
              <img src="fotky/facebook.png" alt="Facebook" />
            </a>
          </li>
        </ul>
      </nav>

      <button type="button" class="burger" id="burger" aria-label="Otevřít menu" aria-controls="navLinks" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <div class="nav-backdrop" id="navBackdrop" hidden></div>
  </header>

  <main>
    <div class="article-top-actions">
      <a href="index.html" class="article-back-arrow" aria-label="Vrátit se na hlavní stránku">
        <span aria-hidden="true">←</span>
        Zpět na hlavní stránku
      </a>
    </div>

    <article class="detail">
      <h1 id="newsTitle">Načítám novinku</h1>
      <p class="article-date" id="newsDate"></p>
      <img id="newsImage" class="article-image json-news-image" src="" alt="" hidden />
      <div id="newsContent">
        <p class="json-news-state">Novinka se načítá.</p>
      </div>
    </article>
  </main>

  <section class="section-divider" aria-label="Oddělovač článku a sponzorů">
    <img src="fotky/zdelovskalavkadole.png" alt="Zdelovská lávka" loading="lazy" />
  </section>

  <footer>
    <div class="footer-inner">
      <div class="footer-socials" aria-label="Sociální sítě">
        <a href="https://www.instagram.com/zdelovskalavka/" target="_blank" rel="noopener noreferrer" aria-label="Instagram Zdelovské lávky">
          <img src="fotky/instagram.png" alt="Instagram" loading="lazy" />
        </a>

        <a href="https://www.facebook.com/events/1381706463970757" target="_blank" rel="noopener noreferrer" aria-label="Facebook Zdelovské lávky">
          <img src="fotky/facebook.png" alt="Facebook" loading="lazy" />
        </a>
      </div>

      <p>&copy; <span id="year"></span> Zdelovská lávka</p>

      <div class="sponsors-section">
        <h3>Partneři a sponzoři</h3>
        <div class="sponsor-logos">
          <img src="fotky/sponzori/osevaagri.png" alt="Oseva Agri" loading="lazy" />
          <img src="fotky/sponzori/a-zchlazeni.png" alt="A-Z Chlazení" loading="lazy" />
          <img src="fotky/sponzori/bencklenoty.png" alt="Benck Lenoty" loading="lazy" />
          <img src="fotky/sponzori/blackdrops.png" alt="Black Drops" loading="lazy" />
          <img src="fotky/sponzori/clock.png" alt="Clock" loading="lazy" />
          <img src="fotky/sponzori/enzltransport.png" alt="Enzl Transport" loading="lazy" />
          <img src="fotky/sponzori/mestoborohradek.png" alt="Město Borohrádek" loading="lazy" />
          <img src="fotky/sponzori/obeczdelov.png" alt="Obec Zdelov" loading="lazy" />
          <img src="fotky/sponzori/realtrading.png" alt="Real Trading" loading="lazy" />
          <img src="fotky/sponzori/slevomat.png" alt="Slevomat" loading="lazy" />
          <img src="fotky/sponzori/teliacom.png" alt="TeliaCom" loading="lazy" />
          <img src="fotky/sponzori/telux.png" alt="Telux" loading="lazy" />
          <img src="fotky/sponzori/farmatichy.png" alt="Farma Tichý" loading="lazy" />
          <img src="fotky/sponzori/zdelovskahospoda.png" alt="Zdelovská hospoda" loading="lazy" />
          <img src="fotky/sponzori/truhlarstvi.png" alt="Truhlářství Syrový" loading="lazy" />
          <img src="fotky/sponzori/sdhzdelov.jpg" alt="SDH Zdelov" loading="lazy" />
          <img src="fotky/sponzori/zea.png" alt="ZEA" loading="lazy" />
          <img src="fotky/sponzori/strabag.png" alt="Strabag" loading="lazy" />
          <img src="fotky/sponzori/agroserviszamel.png" alt="Agroserviszamel" loading="lazy" />
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const burger = document.getElementById("burger");
      const navLinks = document.getElementById("navLinks");
      const navBackdrop = document.getElementById("navBackdrop");
      const year = document.getElementById("year");
      const newsTitle = document.getElementById("newsTitle");
      const newsDate = document.getElementById("newsDate");
      const newsImage = document.getElementById("newsImage");
      const newsContent = document.getElementById("newsContent");

      const closeMenu = () => {
        if (!burger || !navLinks || !navBackdrop) return;
        burger.setAttribute("aria-expanded", "false");
        burger.setAttribute("aria-label", "Otevřít menu");
        navLinks.classList.remove("show");
        navBackdrop.hidden = true;
        document.body.classList.remove("menu-open");
      };

      const openMenu = () => {
        if (!burger || !navLinks || !navBackdrop) return;
        burger.setAttribute("aria-expanded", "true");
        burger.setAttribute("aria-label", "Zavřít menu");
        navLinks.classList.add("show");
        navBackdrop.hidden = false;
        document.body.classList.add("menu-open");
      };

      if (burger && navLinks && navBackdrop) {
        burger.addEventListener("click", () => {
          const isExpanded = burger.getAttribute("aria-expanded") === "true";
          if (isExpanded) closeMenu();
          else openMenu();
        });

        navBackdrop.addEventListener("click", closeMenu);

        navLinks.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", closeMenu);
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && burger.getAttribute("aria-expanded") === "true") closeMenu();
        });

        window.addEventListener("resize", () => {
          if (window.innerWidth > 768) closeMenu();
        });
      }

      if (year) {
        year.textContent = String(new Date().getFullYear());
      }

      const finishLoading = () => {
        document.body.classList.remove("json-news-loading");
      };

      const showMessage = (title, message) => {
        newsTitle.textContent = title;
        newsDate.textContent = "";
        newsImage.hidden = true;
        newsContent.replaceChildren();
        const paragraph = document.createElement("p");
        paragraph.className = "json-news-state";
        paragraph.textContent = message;
        newsContent.appendChild(paragraph);
        finishLoading();
      };

      const params = new URLSearchParams(window.location.search);
      const newsId = params.get("id");

      if (!newsId) {
        showMessage("Novinka nebyla nalezena", "V odkazu chybí ID novinky.");
        return;
      }

      try {
        const response = await fetch("data/novinky.json", { cache: "no-cache" });
        if (!response.ok) throw new Error("Novinky se nepodařilo načíst.");

        const news = await response.json();
        const item = Array.isArray(news) ? news.find((entry) => entry && entry.id === newsId) : null;

        if (!item) {
          showMessage("Novinka nebyla nalezena", "Tahle novinka v souboru data/novinky.json není.");
          return;
        }

        const title = item.titulek || "Novinka";
        newsTitle.textContent = title;
        newsDate.textContent = item.datum || "";
        document.title = `${title} | Zdelovská lávka 2026`;

        if (item.obrazek) {
          newsImage.src = item.obrazek;
          newsImage.alt = title;
          newsImage.hidden = false;
        } else {
          newsImage.hidden = true;
        }

        newsContent.replaceChildren();

        const contentBlocks = Array.isArray(item.obsah) && item.obsah.length ? item.obsah : [item.popis || ""];

        contentBlocks.filter(Boolean).forEach((block) => {
          if (typeof block === "string") {
            const paragraph = document.createElement("p");
            paragraph.textContent = block;
            newsContent.appendChild(paragraph);
            return;
          }

          if (block.typ === "text") {
            const paragraph = document.createElement("p");
            paragraph.textContent = block.text || "";
            newsContent.appendChild(paragraph);
            return;
          }

          if (block.typ === "obrazek" && block.src) {
            const figure = document.createElement("figure");
            figure.className = "json-news-media";

            const image = document.createElement("img");
            image.src = block.src;
            image.alt = block.alt || title;
            image.loading = "lazy";

            figure.appendChild(image);
            newsContent.appendChild(figure);
            return;
          }

          if (block.typ === "video" && block.src) {
            const figure = document.createElement("figure");
            figure.className = "json-news-media";

            const video = document.createElement("video");
            video.src = block.src;
            video.controls = true;
            video.playsInline = true;
            video.preload = "metadata";

            if (block.poster) {
              video.poster = block.poster;
            }

            figure.appendChild(video);
            newsContent.appendChild(figure);
          }
        });

        finishLoading();
      } catch (error) {
        showMessage("Novinka se nenačetla", "Pokud stránku otevíráš přímo ze souboru, spusť ji přes Live Server nebo hosting.");
      }
    });
  </script>
</body>
</html>
